<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Oasis Shop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,sans-serif;
color:#073b2f;
background:linear-gradient(120deg,#9fffe0,#ff4f5e,#9fc7aa);
background-size:400% 400%;
animation:gradientMove 10s ease infinite;
}
@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}
header{
padding:20px 50px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.35);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:10;
}
.brand{
display:flex;
align-items:center;
gap:15px;
font-size:28px;
font-weight:bold;
font-family:cursive;
}
.brand img{
width:70px;
height:70px;
border-radius:50%;
}
nav a{
margin-left:30px;
text-decoration:none;
color:#073b2f;
font-size:18px;
font-weight:bold;
}
.hero{
min-height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
background:
linear-gradient(rgba(159,255,224,.45),rgba(255,79,94,.35)),
url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');
background-size:cover;
background-position:center;
}
.hero-logo{
width:280px;
max-width:80%;
filter:drop-shadow(0 0 25px #9fffe0);
margin-bottom:25px;
}
h1{
font-size:55px;
color:white;
text-shadow:0 4px 15px #003d32;
font-family:cursive;
}
.caption{
font-size:24px;
margin-top:10px;
color:#073b2f;
font-weight:bold;
background:rgba(255,255,255,.65);
padding:10px 25px;
border-radius:30px;
}
.btn{
margin-top:30px;
padding:15px 35px;
border-radius:30px;
border:none;
background:linear-gradient(90deg,#00b383,#ff4f5e);
color:white;
font-size:20px;
font-weight:bold;
text-decoration:none;
box-shadow:0 8px 20px rgba(0,0,0,.25);
}
.products{
padding:60px 30px;
text-align:center;
}
.products h2{
font-size:45px;
font-family:cursive;
margin-bottom:40px;
color:white;
text-shadow:0 3px 10px #073b2f;
}
.product-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
max-width:1000px;
margin:auto;
}
.card{
background:rgba(255,255,255,.8);
border-radius:25px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}
.card img{
width:100%;
border-radius:20px;
}
.price{
color:#ff4f5e;
font-size:22px;
font-weight:bold;
margin:15px 0;
}
.card button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#008f68;
color:white;
font-size:16px;
font-weight:bold;
}
footer{
text-align:center;
padding:25px;
background:rgba(255,255,255,.45);
font-weight:bold;
}
</style>
</head>
<body>
<header>
<div class="brand">
<img src="oasis-logo.png" alt="The Oasis Logo">
The Oasis Shop
</div>
<nav>
<a href="#">Home</a>
<a href="#shop">Shop</a>
<a href="#contact">Contact</a>
</nav>
</header>

<section class="hero">
<img class="hero-logo" src="oasis-logo.png" alt="The Oasis Logo">
<h1>Welcome to The Oasis Shop</h1>
<div class="caption">Revive and Play Again</div>
<a href="#shop" class="btn">Browse Products</a>
</section>

<section class="products" id="shop">
<h2>Featured Products</h2>
<div class="product-grid">
<div class="card">
<img src="oasis-logo.png" alt="T-shirt">
<h3>The Oasis T-Shirt</h3>
<p class="price">$24.99</p>
<button>View Details</button>
</div>
<div class="card">
<img src="oasis-logo.png" alt="Tumbler">
<h3>The Oasis Tumbler</h3>
<p class="price">$19.99</p>
<button>View Details</button>
</div>
</div>
</section>

<footer id="contact">© 2026 The Oasis Shop | Revive and Play Again</footer>
</body>
</html>
